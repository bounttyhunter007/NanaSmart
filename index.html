<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Industrial Sênior</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">🏭 Painel de Equipamentos</h1>
    
    <div class="text-center mb-4">
        <button class="btn btn-primary btn-lg" onclick="buscarEquipamentos()">
            🔄 Buscar Dados da API
        </button>
    </div>

    <div class="row" id="lista-maquinas"></div>
</div>

<script>
    // Esta é a função que conversa com o seu Django!
    function buscarEquipamentos() {
        const divMaquinas = document.getElementById('lista-maquinas');
        divMaquinas.innerHTML = '<p class="text-center">Carregando...</p>';

        // O famoso FETCH (Busca). Ele vai bater na URL da sua API!
        fetch('http://127.0.0.1:8000/api/equipamentos/')
            .then(resposta => resposta.json()) // Transforma a resposta em JSON
            .then(dados => {
                divMaquinas.innerHTML = ''; // Limpa o "carregando"
                
                // Pega o JSON e cria um "Card" visual para cada equipamento
                dados.forEach(maquina => {
                    // Pinta a bolinha de verde se estiver ativo, amarelo se manutenção
                    let corStatus = maquina.status === 'ativo' ? 'success' : (maquina.status === 'manutencao' ? 'warning' : 'danger');

                    const cardHTML = `
                        <div class="col-md-4 mb-3">
                            <div class="card shadow-sm">
                                <div class="card-body">
                                    <h5 class="card-title">${maquina.nome}</h5>
                                    <h6 class="card-subtitle mb-2 text-muted">SN: ${maquina.numero_serie}</h6>
                                    <p class="card-text">
                                        <strong>Fabricante:</strong> ${maquina.fabricante} <br>
                                        <strong>Modelo:</strong> ${maquina.modelo}
                                    </p>
                                    <span class="badge bg-${corStatus}">${maquina.status.toUpperCase()}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    divMaquinas.innerHTML += cardHTML; // Joga na tela!
                });
            })
            .catch(erro => {
                console.error("Erro ao buscar dados:", erro);
                divMaquinas.innerHTML = '<p class="text-danger text-center">Erro ao conectar na API. O servidor do Django está ligado?</p>';
            });
    }
</script>

</body>
</html>
